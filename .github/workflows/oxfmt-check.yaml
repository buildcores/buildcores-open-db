name: Oxfmt Check

on:
  push:
  pull_request:

jobs:
  oxfmt-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check formatting with oxfmt
        run: npx oxfmt@0.38.0 --check
